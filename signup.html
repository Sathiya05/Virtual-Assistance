<!DOCTYPE html>
<html lang="en" dir="ltr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtuAssist | Create Executive Account</title>

    <script src="tailwind.js"></script>
    <link rel="icon" href="images\logo.jpeg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { lavender: '#A78BFA' },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: { 'slow-spin': 'spin 12s linear infinite', 'pulse-glow': 'pulseGlow 4s ease-in-out infinite' },
                    keyframes: { pulseGlow: { '0%, 100%': { opacity: '0.4', transform: 'scale(1)' }, '50%': { opacity: '0.7', transform: 'scale(1.05)' } } }
                }
            }
        }
    </script>

    <style>
        body {
            -webkit-font-smoothing: antialiased;
        }

        .bg-noise {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        .dark .glass-input {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-[#0a0a0a] text-black dark:text-white font-sans transition-theme h-screen overflow-hidden flex items-center justify-center relative">

    <div class="absolute inset-0 z-0 overflow-hidden">
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-lavender/20 dark:bg-lavender/10 rounded-full blur-[120px] animate-pulse-glow">
        </div>
        <div class="bg-noise"></div>
    </div>

    <div class="absolute top-0 left-0 w-full p-6 z-50 flex justify-between items-center">

        <a href="index.html" class="flex items-center gap-3 group shrink-0">
            <div
                class="w-10 h-10 rounded-full bg-[#A78BFA] flex items-center justify-center shadow-md shadow-[#A78BFA]/30 group-hover:scale-105 transition-transform">
                <i class="fa-solid fa-headset text-white text-lg"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-xl font-bold tracking-tight text-black dark:text-white transition-colors">
                    Virtu<span class="text-[#A78BFA]">Assist</span>
                </span>
                <span
                    class="text-[8px] tracking-[0.15em] uppercase text-gray-500 dark:text-gray-400 font-semibold leading-none mt-1">
                    Executive Support
                </span>
            </div>
        </a>
        <div class="flex items-center gap-3">
            <button id="rtlToggle"
                class="w-10 h-10 rounded-full bg-white/50 dark:bg-black/50 backdrop-blur-md border border-gray-200 dark:border-gray-800 flex items-center justify-center text-[10px] font-bold tracking-widest text-gray-600 dark:text-gray-400 hover:text-lavender transition-all shadow-sm">
                RTL
            </button>
            <button id="themeToggle"
                class="w-10 h-10 rounded-full bg-white/50 dark:bg-black/50 backdrop-blur-md border border-gray-200 dark:border-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-400 hover:text-lavender transition-all"><i
                    class="fas fa-moon"></i></button>
        </div>
    </div>

    <div class="relative z-20 w-full max-w-[500px] px-4">
        <div
            class="bg-white/60 dark:bg-black/50 backdrop-blur-2xl border border-white/60 dark:border-gray-700/50 rounded-[2.5rem] py-6 px-8 shadow-2xl">
            <div class="flex justify-center mb-4 relative">
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-14 h-14 border border-lavender/30 border-t-lavender rounded-full animate-slow-spin">
                    </div>
                </div>
                <div
                    class="w-11 h-11 bg-white dark:bg-black rounded-full border border-gray-200 dark:border-gray-800 flex items-center justify-center shadow-inner relative z-10">
                    <i class="fa-solid fa-fingerprint text-lg text-lavender opacity-80"></i>
                </div>
            </div>
            <div class="text-center mb-4">
                <h1 class="text-xl font-serif font-bold">Create Account</h1>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-0.5">Join the Executive
                    Network</p>
            </div>

            <form id="signupForm" class="space-y-3">
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 ml-1"> Name</label>
                    <input type="text" placeholder="John Doe" required
                        class="w-full px-4 py-2.5 rounded-xl bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 text-sm text-black dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-lavender/50 focus:border-lavender transition-all shadow-sm">
                </div>

                <div class="space-y-1">
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 ml-1"> Email</label>
                    <input type="email" placeholder="john@company.com" required
                        class="w-full px-4 py-2.5 rounded-xl bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 text-sm text-black dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-lavender/50 focus:border-lavender transition-all shadow-sm">
                </div>

                <div class="space-y-1">
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 ml-1">Create Password</label>
                    <div class="relative">
                        <input type="password" placeholder="Min. 8 characters" required
                            class="w-full pl-4 pr-12 py-2.5 rounded-xl bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 text-sm text-black dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-lavender/50 focus:border-lavender transition-all shadow-sm">
                        <button type="button"
                            class="togglePassword absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-lavender transition-colors">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 ml-1">Confirm
                        Password</label>
                    <div class="relative">
                        <input type="password" placeholder="Repeat password" required
                            class="w-full pl-4 pr-12 py-2.5 rounded-xl bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 text-sm text-black dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-lavender/50 focus:border-lavender transition-all shadow-sm">
                        <button type="button"
                            class="togglePassword absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-lavender transition-colors">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="pt-1 pb-1">
                    <label class="flex items-start gap-3 cursor-pointer group">
                        <div
                            class="w-4 h-4 mt-0.5 rounded border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-black/50 flex items-center justify-center transition-colors group-hover:border-lavender relative shrink-0">
                            <input type="checkbox" required class="absolute opacity-0 cursor-pointer peer">
                            <i
                                class="fa-solid fa-check text-[8px] text-white opacity-0 peer-checked:opacity-100 peer-checked:text-lavender"></i>
                        </div>
                        <span
                            class="text-xs text-gray-500 font-medium leading-normal group-hover:text-gray-700 dark:group-hover:text-gray-300 transition-colors">
                            I agree to the <a href="#" class="text-lavender hover:underline font-bold">Terms</a> and <a
                                href="#" class="text-lavender hover:underline font-bold">Privacy</a>
                        </span>
                    </label>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-3 mt-1 rounded-xl bg-black dark:bg-white text-white dark:text-black font-bold text-sm hover:-translate-y-0.5 shadow-xl hover:shadow-lavender/20 transition-all">
                    Sign Up
                </button>
            </form>

            <div class="mt-4 text-center text-xs text-gray-500">
                Already have an account? <a href="login.html" class="font-bold text-lavender hover:underline">Log In</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // RTL Toggle Logic
        const rtlToggleBtn = document.getElementById("rtlToggle");
        rtlToggleBtn.addEventListener("click", () => {
            const html = document.documentElement;
            const isRTL = html.getAttribute('dir') === 'rtl';
            if (isRTL) {
                html.setAttribute('dir', 'ltr');
                rtlToggleBtn.innerText = 'RTL';
            } else {
                html.setAttribute('dir', 'rtl');
                rtlToggleBtn.innerText = 'LTR';
            }
        });

        // Password Visibility Logic
        document.querySelectorAll('.togglePassword').forEach(btn => {
            btn.addEventListener('click', function () {
                const input = this.previousElementSibling;
                const icon = this.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                    icon.classList.add('text-lavender');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                    icon.classList.remove('text-lavender');
                }
            });
        });

        const form = document.getElementById('signupForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i>`;
            setTimeout(() => window.location.href = "user.html", 1500);
        });
    </script>
</body>

</html>
